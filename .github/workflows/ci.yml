name: CI

on:
  push:
    branches: [main, arena/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check code style (Prettier)
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (production target)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          load: true
          tags: god-is-loving-and-kind-bot:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
